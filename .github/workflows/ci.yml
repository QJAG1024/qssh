name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Build & Test — every push/PR ──
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - run: go build ./...
      - run: go vet ./...
      - run: go test -count=1 ./...

  # ── Release: build binaries (matrix) ──
  build-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [check]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            suffix: ""
          - os: linux
            arch: arm64
            suffix: ""
          - os: darwin
            arch: amd64
            suffix: ""
          - os: darwin
            arch: arm64
            suffix: ""
          - os: windows
            arch: amd64
            suffix: .exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Build
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
          CGO_ENABLED=0 \
          go build -ldflags="-s -w -X 'main.version=$(git describe --tags --always)'" -o qssh_${{ matrix.os }}_${{ matrix.arch }}${{ matrix.suffix }} .

      - uses: actions/upload-artifact@v4
        with:
          name: qssh_${{ matrix.os }}_${{ matrix.arch }}
          path: qssh_${{ matrix.os }}_${{ matrix.arch }}${{ matrix.suffix }}

  # ── Release: create release + upload all assets (single run) ──
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - run: ls -R artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true